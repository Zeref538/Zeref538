<svg width="860" height="240" viewBox="0 0 860 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="John Andrei Martinez — AI/ML Engineer">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="860" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <clipPath id="frame"><rect width="860" height="240" rx="12"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <!-- terminal background -->
    <rect width="860" height="240" rx="12" fill="#07090d"/>
    <rect x="0.5" y="0.5" width="859" height="239" rx="11.5" stroke="#1f2733"/>

    <!-- CRT scanlines -->
    <g fill="#ffffff" opacity="0.018">
      <rect y="8" width="860" height="1"/><rect y="20" width="860" height="1"/><rect y="32" width="860" height="1"/><rect y="44" width="860" height="1"/><rect y="56" width="860" height="1"/><rect y="68" width="860" height="1"/><rect y="80" width="860" height="1"/><rect y="92" width="860" height="1"/><rect y="104" width="860" height="1"/><rect y="116" width="860" height="1"/><rect y="128" width="860" height="1"/><rect y="140" width="860" height="1"/><rect y="152" width="860" height="1"/><rect y="164" width="860" height="1"/><rect y="176" width="860" height="1"/><rect y="188" width="860" height="1"/><rect y="200" width="860" height="1"/><rect y="212" width="860" height="1"/><rect y="224" width="860" height="1"/>
    </g>

    <!-- title bar -->
    <rect width="860" height="34" fill="#0b0e14"/>
    <rect y="33" width="860" height="1" fill="#1f2733"/>
    <circle cx="20" cy="17" r="5" fill="#ff5f56"/>
    <circle cx="38" cy="17" r="5" fill="#ffbd2e"/>
    <circle cx="56" cy="17" r="5" fill="#27c93f"/>
    <text x="430" y="21" text-anchor="middle" font-family="ui-monospace,'JetBrains Mono',Consolas,monospace" font-size="12" fill="#8b98a9">zeref@portfolio: ~/john-andrei-martinez</text>

    <!-- boot log -->
    <g font-family="ui-monospace,'JetBrains Mono',Consolas,monospace" font-size="13">
      <text x="24" y="62" fill="#8b98a9"><tspan fill="#22d3ee">$</tspan> whoami</text>
      <text x="24" y="92" font-size="26" font-weight="bold" fill="#e6edf3">John Andrei Martinez</text>
      <text x="24" y="118" fill="url(#accent)" font-size="15" font-weight="bold">AI/ML Engineer · Agentic AI · RAG · Computer Vision</text>

      <text x="24" y="148" fill="#8b98a9"><tspan fill="#22d3ee">$</tspan> ./init --mode ship-to-production</text>
      <text x="24" y="170" fill="#8b98a9"><tspan fill="#27c93f">[ ok ]</tspan> local agents · forecasting · full-stack — deployed</text>
      <text x="24" y="192" fill="#8b98a9"><tspan fill="#8b5cf6">[info]</tspan> CS student @ Our Lady of Fatima University · open to AI/ML &amp; data roles<tspan fill="#22d3ee">
        <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/> █</tspan></text>
    </g>

    <!-- tmux-style status bar -->
    <rect y="214" width="860" height="26" fill="#0b0e14"/>
    <rect y="214" width="860" height="1" fill="#1f2733"/>
    <g font-family="ui-monospace,'JetBrains Mono',Consolas,monospace" font-size="11.5">
      <text x="24" y="231" fill="#8b5cf6">[0] session: zeref</text>
      <text x="200" y="231" fill="#8b98a9">status: shipping</text>
      <text x="836" y="231" text-anchor="end" fill="#22d3ee">San Jose del Monte, PH · UTC+8</text>
    </g>
  </g>
</svg>
